<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ALON — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'DM Sans',sans-serif;overflow:hidden;background:#000;touch-action:pan-y;-webkit-user-select:none;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit;outline:none;border:none;-webkit-user-select:text;user-select:text}
img{display:block;max-width:100%}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}

/* ===== DESIGN TOKENS ===== */
:root{
  --navy900:#060F24;--navy800:#0D1F4A;--navy700:#142E5C;
  --terra600:#B8451E;--terra500:#D95F2B;--terra400:#E8774A;--terra300:#F0A080;--terra200:#F8D0BC;--terra100:#FDF0EA;--terra50:#FEF7F3;
  --cream:#F5F0E8;--warm50:#FAF8F4;--warm100:#F0EDE6;--warm200:#E0D8CC;--warm300:#C8BFB0;--warm400:#A89E8E;--warm500:#7A7264;--warm600:#5C554A;
  --gray50:#F8F9FC;--gray100:#F0F1F5;--gray200:#E2E4EB;--gray300:#C8CBD6;--gray400:#9CA1B3;--gray500:#6B7189;
  --green500:#22C55E;--green100:#DCFCE7;--amber500:#F59E0B;--amber100:#FEF3C7;--red500:#EF4444;
  --textPrimary:#0D1F4A;--textSecondary:#5C554A;--textTertiary:#A89E8E;
  --voiceBg:#0d1117;--activationGlow:#E8A84C;
  --safe-top:50px;--safe-bottom:20px;
}
@supports(padding-top:env(safe-area-inset-top)){
  @media(max-width:499px){
    :root{--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,10px);}
  }
}

/* ===== PHONE MOCKUP ===== */
body{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh}
.phone-mockup{position:relative}
@media(min-width:500px){
  .phone-mockup{
    width:390px;height:844px;border-radius:50px;border:10px solid #1a1a1a;
    box-shadow:0 30px 90px rgba(0,0,0,.5),0 0 0 2px #333,inset 0 0 0 2px #333;
    overflow:hidden;background:#1a1a1a;
  }
  .dynamic-island{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;z-index:9999;
  }
}
@media(max-width:499px){
  .phone-mockup{width:100vw;height:100vh;height:100dvh;overflow:hidden}
  .dynamic-island{display:none}
  :root{--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,10px)}
}
.app-container{position:absolute;inset:0;overflow:hidden;background:#fff}

/* ===== SCREEN BASE ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:transform .3s ease,opacity .3s ease;transform:translateX(30px);z-index:1}
.screen.active{opacity:1;pointer-events:auto;transform:translateX(0);z-index:10}
.screen.exit-left{opacity:0;transform:translateX(-30px);pointer-events:none}
.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}

/* ===== SHARED COMPONENTS ===== */
.glass-back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.glass-back svg{width:20px;height:20px}
.cta-btn{width:100%;padding:16px;border-radius:16px;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,opacity .15s}
.cta-btn:active{transform:scale(.97);opacity:.9}
.cta-white{background:#fff;color:var(--navy800)}
.cta-terra{background:var(--terra500);color:#fff}
.cta-navy{background:var(--navy800);color:#fff}
.safe-top{height:var(--safe-top);flex-shrink:0}
.safe-bottom{height:var(--safe-bottom);flex-shrink:0}

/* Avatar */
.alon-avatar{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.alon-avatar .body{border-radius:35%;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.alon-avatar.light .body{background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2)}
.alon-avatar.default .body{background:var(--terra50);border:1px solid var(--terra200)}
.alon-avatar .eye{background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.alon-avatar .iris{background:var(--terra500);border-radius:50%;animation:blink 3.5s infinite}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
.alon-avatar .ring{position:absolute;border-radius:50%;z-index:1;animation:pulse-ring 2.5s infinite}
.alon-avatar .ring:nth-child(2){animation-delay:.5s}
.alon-avatar.light .ring{border:1.5px solid rgba(232,168,76,.3)}
.alon-avatar.default .ring{border:1.5px solid rgba(217,95,43,.15)}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.4);opacity:0}}

/* Bottom sheet */
.sheet-overlay{position:absolute;inset:0;z-index:200;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet-body{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:80%;display:flex;flex-direction:column}
.sheet-overlay.open .sheet-body{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--gray300);border-radius:2px;margin:10px auto 0}
.sheet-title{font-size:18px;font-weight:700;color:var(--textPrimary);padding:16px 20px 8px}
.sheet-scroll{flex:1;overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch}
.pill{display:inline-flex;align-items:center;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;border:1.5px solid var(--warm200);color:var(--textSecondary);background:#fff;cursor:pointer;transition:all .2s;margin:4px}
.pill.active{background:var(--terra500);color:#fff;border-color:var(--terra500)}
.pill:active{transform:scale(.95)}
.sheet-done{margin:12px 20px 20px;padding:14px;border-radius:14px;background:var(--terra500);color:#fff;font-size:15px;font-weight:600;text-align:center;flex-shrink:0}

/* Chat bubbles */
.chat-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}
.chat-row.alon{flex-direction:row}
.chat-row.user{flex-direction:row-reverse}
.chat-bubble{max-width:82%;padding:12px 16px;font-size:14px;line-height:1.5;border-radius:16px}
.chat-row.alon .chat-bubble{background:var(--cream);color:var(--textPrimary);border-bottom-left-radius:4px}
.chat-row.user .chat-bubble{background:var(--terra500);color:#fff;border-bottom-right-radius:4px}

/* ===== SCREEN: SPLASH ===== */
#splash{background:var(--navy800)}
.splash-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px}
.splash-wordmark{font-family:'DM Serif Display',serif;font-size:32px;color:#fff;margin-top:24px;letter-spacing:1px;margin-bottom:4px}
.splash-tagline{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px}
.splash-desc{font-size:16px;font-weight:500;color:#fff;text-align:center;line-height:24px}
.splash-promises{display:flex;flex-direction:column;gap:12px;margin-top:24px;align-self:stretch}
.splash-promise{display:flex;align-items:flex-start;gap:12px}
.splash-promise-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.splash-promise-icon.blue{background:rgba(74,114,232,.25);color:#7B9BF2}
.splash-promise-icon.amber{background:rgba(245,166,35,.2);color:#F5C16C}
.splash-promise-text{font-size:12px;line-height:18px;color:rgba(255,255,255,.55);flex:1}
.splash-promise-bold{color:#F0EDE6;font-weight:500}
.splash-footer{padding:20px 24px;padding-bottom:calc(20px + var(--safe-bottom));flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:16px}
.splash-fine{font-size:12px;color:rgba(255,255,255,.25)}

/* ===== SCREEN: GOAL ===== */
#goal,#intent{background:var(--navy700)}
.dk-header{padding:16px 20px 0;padding-top:calc(var(--safe-top) + 8px);flex-shrink:0}
.dk-avatar-row{display:flex;align-items:center;gap:8px;margin-top:16px}
.dk-avatar-label{font-family:'DM Serif Display',serif;font-size:18px;color:#fff}
.dk-chat-bubble{background:rgba(255,255,255,.08);border-radius:16px;border-bottom-left-radius:4px;padding:14px 18px;margin:16px 20px 0;color:rgba(255,255,255,.9);font-size:15px;line-height:1.5}
.goal-cards{padding:16px 20px;display:flex;flex-direction:column;gap:12px;flex:1}
.goal-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;display:flex;gap:16px;align-items:center;cursor:pointer;transition:background .2s}
.goal-card:active{background:rgba(255,255,255,.12)}
.goal-card-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.goal-card-icon svg{width:24px;height:24px}
.goal-card h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:2px}
.goal-card p{font-size:13px;color:rgba(255,255,255,.55)}
.dk-footer{padding:16px 20px;padding-bottom:calc(16px + var(--safe-bottom));text-align:center;color:rgba(255,255,255,.4);font-size:12px;flex-shrink:0}

/* ===== SCREEN: PROFILE ===== */
#profile{background:#fff}
.profile-header{display:flex;align-items:center;padding:12px 16px;gap:12px;flex-shrink:0;border-bottom:1px solid var(--warm100);padding-top:calc(var(--safe-top) + 4px)}
.profile-header .back-btn{width:36px;height:36px;border-radius:10px;background:var(--warm50);display:flex;align-items:center;justify-content:center;color:var(--textSecondary)}
.profile-header .title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--textPrimary)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;background:var(--green100);font-size:11px;font-weight:500;color:var(--green500);margin-left:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green500);animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* Mode cards */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px;padding-bottom:calc(16px + var(--safe-bottom));flex-shrink:0}
.mode-card{background:var(--cream);border:1.5px solid var(--warm200);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:left}
.mode-card:active{transform:scale(.97);border-color:var(--terra400)}
.mode-card-icon{width:38px;height:38px;border-radius:10px;background:var(--terra50);display:flex;align-items:center;justify-content:center;color:var(--terra500);margin-bottom:8px}
.mode-card-icon svg{width:18px;height:18px}
.mode-card h4{font-size:14px;font-weight:600;color:var(--textPrimary);margin-bottom:2px}
.mode-card p{font-size:12px;color:var(--textTertiary);line-height:1.3}

/* Prediction card */
.prediction-card{background:#fff;border:1.5px solid var(--warm200);border-radius:16px;margin:0 20px;overflow:hidden}
.prediction-header{background:var(--warm50);padding:12px 16px;border-bottom:1px solid var(--warm100)}
.prediction-context{font-size:11px;font-weight:600;color:var(--terra500);text-transform:uppercase;letter-spacing:.5px}
.prediction-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--warm100);cursor:pointer}
.prediction-row:last-child{border-bottom:none}
.prediction-row-left{display:flex;align-items:center;gap:10px}
.prediction-row-icon{color:var(--textTertiary)}
.prediction-row-icon svg{width:16px;height:16px}
.prediction-row-label{font-size:12px;color:var(--textTertiary)}
.prediction-row-value{font-size:14px;font-weight:500;color:var(--textPrimary)}
.prediction-row-right{display:flex;align-items:center;gap:4px;color:var(--textTertiary)}
.prediction-row-right svg{width:14px;height:14px}
.prediction-brief{padding:14px 16px;background:var(--terra50);margin:0;font-size:13px;color:var(--textSecondary);line-height:1.5;border-top:1px solid var(--warm100)}

/* ===== SCREEN: SIGNUP ===== */
#signup{background:#fff}
.signup-inner{flex:1;display:flex;flex-direction:column;padding:0 24px}
.step-dots{display:flex;gap:6px;margin:20px 0}
.step-dot{height:3px;border-radius:2px;flex:1;background:var(--warm200);transition:background .3s}
.step-dot.active{background:var(--terra500)}
.signup-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--textPrimary);margin-bottom:8px;line-height:1.2}
.signup-sub{font-size:14px;color:var(--textSecondary);margin-bottom:24px}
.signup-input{width:100%;padding:16px;border:1.5px solid var(--warm200);border-radius:14px;font-size:16px;color:var(--textPrimary);background:var(--warm50);transition:border-color .2s}
.signup-input:focus{border-color:var(--terra500)}
.signup-input::placeholder{color:var(--textTertiary)}
.phone-row{display:flex;gap:8px}
.country-code{width:72px;padding:16px 10px;border:1.5px solid var(--warm200);border-radius:14px;font-size:16px;color:var(--textPrimary);background:var(--warm50);text-align:center;flex-shrink:0}
.privacy-badge{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;color:var(--textTertiary)}
.privacy-badge svg{width:14px;height:14px;color:var(--green500)}
.otp-row{display:flex;gap:8px;justify-content:center}
.otp-box{width:48px;height:56px;border:1.5px solid var(--warm200);border-radius:12px;font-size:22px;font-weight:600;color:var(--textPrimary);text-align:center;background:var(--warm50);transition:border-color .2s}
.otp-box.filled{border-color:var(--terra500);background:var(--terra50)}
.otp-timer{font-size:13px;color:var(--textTertiary);text-align:center;margin-top:16px}
.signup-cta-area{padding:20px 0;padding-bottom:calc(20px + var(--safe-bottom));flex-shrink:0;margin-top:auto}

/* ===== SCREEN: ACTIVATION ===== */
#activation{background:var(--navy800);overflow:hidden}
.activation-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 24px}
.signal-rings{position:relative;width:160px;height:160px;margin-top:40px;display:flex;align-items:center;justify-content:center}
.signal-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(232,168,76,.15);animation:signal-pulse 2.5s infinite}
.signal-ring:nth-child(1){width:100%;height:100%;animation-delay:0s}
.signal-ring:nth-child(2){width:130%;height:130%;animation-delay:.4s}
.signal-ring:nth-child(3){width:160%;height:160%;animation-delay:.8s}
@keyframes signal-pulse{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.1);opacity:0}}
.activation-title{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;text-align:center;margin-top:24px}
.activation-sub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;margin-top:4px}
.status-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;margin-top:24px;width:100%}
.status-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.status-pill-tag{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:500;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.counter-row{display:flex;justify-content:space-around;margin-bottom:16px}
.counter-item{text-align:center}
.counter-num{font-family:'DM Serif Display',serif;font-size:24px;color:#fff}
.counter-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.status-steps{display:flex;flex-direction:column;gap:8px}
.status-step{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.7)}
.status-step .check-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.status-step .check-icon.done{background:var(--green500);color:#fff}
.status-step .check-icon.pending{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3)}
.status-step .check-icon svg{width:12px;height:12px}
.progress-bar{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin-top:16px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--terra500),var(--activationGlow));transition:width 2s ease}
.notify-row{display:flex;gap:8px;margin-top:20px;justify-content:center}
.notify-chip{padding:8px 16px;border-radius:100px;font-size:12px;font-weight:500;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .2s}
.notify-chip.selected{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
.activation-cta{padding:20px 24px;padding-bottom:calc(20px + var(--safe-bottom));flex-shrink:0}

/* ===== SCREEN: DASHBOARD ===== */
#dashboard{background:#fff}
.dash-header{background:var(--navy800);border-radius:0 0 20px 20px;padding:0 20px 16px;flex-shrink:0;padding-top:calc(var(--safe-top) + 4px)}
.dash-top-row{display:flex;align-items:center;justify-content:space-between}
.dash-greeting{font-size:13px;color:rgba(255,255,255,.5)}
.dash-name{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-top:2px}
.dash-active{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--green500);margin-top:4px}
.dash-right{display:flex;align-items:center;gap:12px}
.dash-bell{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff}
.dash-bell svg{width:18px;height:18px}
.dash-prefs{margin-top:12px;padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.dash-add-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:8px 0}
.dash-add-text{font-size:13px;color:rgba(255,255,255,.6)}
.dash-add-btn{padding:5px 12px;border-radius:100px;background:var(--terra500);color:#fff;font-size:12px;font-weight:600;cursor:pointer}

/* Journey section */
.journey-section{background:var(--cream);padding:14px 0 8px;flex-shrink:0}
.journey-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px}
.journey-title{font-size:15px;font-weight:600;color:var(--textPrimary)}
.journey-count{padding:3px 8px;border-radius:6px;background:var(--warm100);font-size:11px;color:var(--warm500)}
.stage-strip{display:flex;gap:6px;overflow-x:auto;padding:0 20px 10px;-webkit-overflow-scrolling:touch}
.stage-pill{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0;border:1.5px solid transparent}
.stage-pill.active{background:#fff;color:var(--terra500);border-color:var(--warm200);font-weight:600}
.stage-pill.inactive{background:transparent;color:var(--warm400)}
.stage-detail{padding:8px 20px 6px;font-size:13px;color:var(--textSecondary);display:flex;align-items:center;gap:6px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--terra500);animation:pulse-dot 1.5s infinite;flex-shrink:0}

/* Chat zone collapsed */
.chat-zone{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-expand-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;border-bottom:1px solid var(--warm100)}
.chat-expand-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--textPrimary)}
.chat-expand-right{color:var(--textTertiary)}
.chat-expand-right svg{width:18px;height:18px}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch;min-height:0}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--warm100);flex-shrink:0;padding-bottom:calc(10px + var(--safe-bottom));background:#fff}

// ===== HELPERS =====
function fmtBudget(v){
  if(v>=10000000) return '\u20b9'+(v/10000000).toFixed(1)+' Cr';
  if(v>=100000) return '\u20b9'+(v/100000).toFixed(0)+' L';
  if(v>=1000) return '\u20b9'+(v/1000).toFixed(0)+'K';
  return '\u20b9'+v;
}

function avatar(size,variant='default'){
  const bodyS=size, eyeS=size*.38, irisS=size*.16;
  const ringS1=size*1.3, ringS2=size*1.55;
  const cls=variant==='light'?'light':'default';
  return `<div class="alon-avatar ${cls}" style="width:${ringS2}px;height:${ringS2}px">
    <div class="ring" style="width:${ringS1}px;height:${ringS1}px"></div>
    <div class="ring" style="width:${ringS2}px;height:${ringS2}px"></div>
    <div class="body" style="width:${bodyS}px;height:${bodyS}px">
      <div class="eye" style="width:${eyeS}px;height:${eyeS}px">
        <div class="iris" style="width:${irisS}px;height:${irisS}px"></div>
      </div>
    </div>
  </div>`;
}

function getPersona(){ return PERSONAS[S.persona]||PERSONAS.first; }
function getProp(id){ return PROPERTIES.find(p=>p.id===id)||PROPERTIES[0]; }
function isRent(){ return S.goal==='rent'; }
function displayName(){ return S.userName||'there'; }

// ===== NAVIGATION =====
function nav(to){
  if(to===S.screen) return;
  S.prevScreen=S.screen;
  S.screen=to;
  render();
}
function goBack(){
  const back=BACK_MAP[S.screen];
  if(back) nav(back);
}

// ===== RENDER ENGINE =====
function render(){
  const app=document.getElementById('app');
  app.innerHTML = renderScreen();
  // Activate current screen
  requestAnimationFrame(()=>{
    document.querySelectorAll('.screen').forEach(s=>{
      if(s.id===S.screen) s.classList.add('active');
    });
    lucide.createIcons();
    afterRender();
  });
}

function renderScreen(){
  let html='';
  // Only render current screen for performance
  switch(S.screen){
    case 'splash': html=renderSplash(); break;
    case 'goal': html=renderGoal(); break;
    case 'intent': html=renderIntent(); break;
    case 'profile': html=renderProfile(); break;
    case 'signup': html=renderSignup(); break;
    case 'activation': html=renderActivation(); break;
    case 'dashboard': html=renderDashboard(); break;
    case 'properties': html=renderProperties(); break;
    case 'property-detail': html=renderPropertyDetail(); break;
    case 'shortlist': html=renderShortlist(); break;
    case 'voice': html=renderVoice(); break;
    case 'verified-list': html=renderVerifiedList(); break;
    case 'conflict-check': html=renderConflictCheck(); break;
  }
  return html;
}

      <div style="display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--warm200);border-radius:12px;cursor:pointer;opacity:.5"><i data-lucide="mic" style="width:20px;height:20px;color:var(--textTertiary)"></i><div><div style="font-size:14px;font-weight:500;color:var(--textPrimary)">Voice describe</div><div style="font-size:12px;color:var(--textTertiary)">Coming soon</div></div></div>
      <div style="display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--warm200);border-radius:12px;cursor:pointer" onclick="closeSheet()"><i data-lucide="edit-3" style="width:20px;height:20px;color:var(--textTertiary)"></i><div><div style="font-size:14px;font-weight:500;color:var(--textPrimary)">Enter manually</div><div style="font-size:12px;color:var(--textTertiary)">Name, location, price</div></div></div>
      <div style="display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--warm200);border-radius:12px;cursor:pointer" onclick="closeSheet()"><i data-lucide="camera" style="width:20px;height:20px;color:var(--textTertiary)"></i><div><div style="font-size:14px;font-weight:500;color:var(--textPrimary)">Screenshot</div><div style="font-size:12px;color:var(--textTertiary)">Upload a screenshot of a listing</div></div></div>
    </div>`;
  }

  container.innerHTML=`<div class="sheet-overlay open" onclick="closeSheet()">
    <div class="sheet-body" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${title}</div>
      <div class="sheet-scroll">${content}</div>
      <button class="sheet-done" onclick="closeSheet()">Done</button>
      <div class="safe-bottom"></div>
    </div>
  </div>`;
  lucide.createIcons();
}

function refreshSheet(type){
  // Re-open sheet with updated state
  openSheet(type);
}

function closeSheet(){
  const overlay = document.querySelector('.sheet-overlay');
  if(overlay){
    overlay.classList.remove('open');
    setTimeout(()=>{
      const container = document.getElementById('sheet-container');
      if(container) container.innerHTML='';
    },350);
  }
}

// ===== ACTIONS =====
function selectPersona(persona){
  S.persona=persona;
  const p=getPersona();
  S.locations=[...p.locations];
  S.propertyType=p.propertyType;
  S.propertySize=[...(p.propertySize||[])];
  S.budget={...p.budget};
  S.purpose=p.purpose;
  S.timeline=p.timeline;
  if(p.numberOfPeople) S.numberOfPeople=p.numberOfPeople;
  if(p.chargeableArea) S.chargeableArea=p.chargeableArea;
  S.profileMode=null;
  nav('profile');
}

function toggleArr(key,val){
  const idx=S[key].indexOf(val);
  if(idx>=0) S[key].splice(idx,1);
  else S[key].push(val);
}

function toggleLike(id){
  S.likedProperties[id]=!S.likedProperties[id];
  render();
}

function submitName(){
  const input=document.getElementById('nameInput');
  if(input) S.userName=input.value.trim()||'';
  if(!S.userName){S.userName='Alex';}
  S.signupStep='phone';
  render();
}

function submitPhone(){
  const input=document.getElementById('phoneInput');
  if(input) S.userPhone=input.value.trim()||'98765 43210';
  if(!S.userPhone) S.userPhone='98765 43210';
  S.signupStep='otp';
  render();
}

function signupBack(){
  if(S.signupStep==='otp'){S.signupStep='phone';render();}
  else if(S.signupStep==='phone'){S.signupStep='name';render();}
  else goBack();
}

function handleVoiceTap(){
  if(S.voiceState==='idle'){
    S.voiceState='listening';
    render();
    setTimeout(()=>{S.voiceState='done';render();},2500);
  } else if(S.voiceState==='done'){
    S.voiceState='idle';
    render();
  }
}

function startConflictCheck(){
  S.conflictPhase=1;
  render();
  setTimeout(()=>{S.conflictPhase=2;render();},2500);
}

// ===== AFTER RENDER HOOKS =====
function afterRender(){
  if(S.screen==='signup'&&S.signupStep==='otp'){
    setTimeout(()=>{
      const code='283746';
      for(let i=0;i<6;i++){
        const box=document.getElementById('otp'+i);
        if(box){box.value=code[i];box.classList.add('filled');}
      }
      const cta=document.getElementById('otpCta');
      if(cta){cta.style.opacity='1';cta.style.pointerEvents='auto';}
      const timer=document.getElementById('otpTimer');
      if(timer) timer.textContent='Code verified!';
    },2000);
  }
  if(S.screen==='activation'){
    animateCounter('cnt1',12847,1800);
    animateCounter('cnt2',342,1800);
    animateCounter('cnt3',5,1500);
    setTimeout(()=>{
      const fill=document.getElementById('progressFill');
      if(fill) fill.style.width='100%';
    },100);
    setTimeout(()=>{
      const s3=document.getElementById('step3');
      if(s3){s3.classList.remove('pending');s3.classList.add('done');s3.innerHTML='<i data-lucide="check"></i>';lucide.createIcons();}
    },1200);
    setTimeout(()=>{
      const s4=document.getElementById('step4');
      if(s4){s4.classList.remove('pending');s4.classList.add('done');s4.innerHTML='<i data-lucide="check"></i>';lucide.createIcons();}
    },2000);
  }
  if(S.screen==='verified-list'&&S.verifyPhase===0){
    const items=5;
    for(let i=0;i<items;i++){
      setTimeout(()=>{
        const el=document.getElementById('vci'+i);
        if(el){el.classList.remove('pending');el.classList.add('done');el.innerHTML='<i data-lucide="check"></i>';lucide.createIcons();}
        if(i===items-1){
          setTimeout(()=>{S.verifyPhase=1;render();},600);
        }
      },(i+1)*600);
    }
  }
}

function animateCounter(id,target,duration){
  const el=document.getElementById(id);
  if(!el) return;
  const start=performance.now();
  function step(now){
    const progress=Math.min((now-start)/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(target*eased).toLocaleString();
    if(progress<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ===== GESTURE / KEYBOARD =====
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(touchStartX<40 && dx>80) goBack();
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') goBack();
});

// ===== INIT =====
render();
</script>
